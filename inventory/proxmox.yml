---
proxmox:
  children:
    jd_proxmox:
      hosts:
        jd-proxmox-01.linds.com.au:
          ansible_host: 10.0.50.246
      vars:
        proxmox_zfs_datasets:
          - name: VM/truenas-nas
            properties:
              mountpoint: /mnt/NAS
              recordsize: 1M
              compression: zstd
              atime: "off"
              acltype: posix
          - name: VM/truenas-nas/minio
            properties:
              recordsize: 1M
          - name: truenas-hdd
            properties:
              mountpoint: /mnt/HDD

        proxmox_nfs_exports:
          - path: /mnt/NAS
            options: rw,no_root_squash,insecure,no_subtree_check
            networks:
              - 10.0.50.0/24
              - 10.0.53.0/24
              - 10.3.1.0/24
              - 10.0.36.0/24
          - path: /mnt/HDD
            options: rw,anonuid=0,anongid=0,all_squash,insecure,no_subtree_check
            networks:
              - 10.0.53.0/24
              - 10.0.50.0/24

        proxmox_iscsi_targets:
          - iqn: iqn.2005-10.org.truenas:arr-suite
            portal_ip: 10.0.50.246
            portal_port: 3260
            luns:
              - name: arr-iscsi
                wwn: f41b5e6d-1ccd-400e-bff4-713ef6d53d9f
                plugin: fileio
                path: /mnt/NAS/arr-iscsi
                size: 21474840576
                write_back: true

        proxmox_sanoid_policies:
          - dataset: VM/truenas-nas
            template: ssd_short
            recursive: true

        proxmox_lxc_containers:
          - vmid: 106
            hostname: jd-minio-01
            description: "MinIO S3 (OCI image, migrated from jd-truenas-01)"
            # OCI image must be staged in advance with:
            #   pveam download local <oci-tar>
            ostemplate: local:vztmpl/minio_latest.tar
            storage: ssd-mixed
            rootfs_size: 4
            cores: 2
            memory: 1024
            swap: 256
            unprivileged: true
            onboot: true
            network:
              bridge: vmbr0
              ip: 10.0.53.20/24
              gw: 10.0.53.1
              tag: 53
            mounts:
              - id: 0
                host_path: /mnt/NAS/minio
                ct_path: /export
                # Map container UID 0 to on-disk UID 473 so MinIO root
                # can read/write the existing data (preserves ownership)
                idmap: "u:0:473:1;g:0:473:1"
            entrypoint: "/usr/bin/docker-entrypoint.sh minio server /export --console-address :9002"
            env:
              MINIO_ROOT_USER: "{{ vault_minio_root_user }}"
              MINIO_ROOT_PASSWORD: "{{ vault_minio_root_password }}"
