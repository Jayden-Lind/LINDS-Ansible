---
# All NAT for linds-vyos. Source NAT (rules 10–23) + WireGuard SNAT (9999)
# + destination NAT / port forwards (rule 20).
#
# Source-NAT numbering scheme:
#   10   LINDS-LAN          → WAN (masq, except LAN-Addresses)
#   21   LINDS-SERVER (300) → WAN (masq, except LAN-Addresses)
#   22   LINDS_VPN (36)     → WAN (masq, except LAN-Addresses)
#   23   single host 10.0.80.4 (UniFi controller) → WAN (no exception)
#   9999 LINDS_VPN (36)     → wg101
#
# (10.0.80.0/24 management has no general SNAT — only the .4 controller egresses.)
# (10.0.110.0/24 cameras has no SNAT — fully internal.)

# ===== Source NAT =========================================================
- name: Source NAT — LINDS-LAN egress
  vyos.vyos.vyos_config:
    lines:
      - set nat source rule 10 outbound-interface name "{{ wan_interface }}"
      - set nat source rule 10 source address 192.168.6.0/24
      - set nat source rule 10 destination group network-group '!LAN-Addresses'
      - set nat source rule 10 translation address masquerade

- name: Source NAT — VLAN300 LINDS-SERVER egress
  vyos.vyos.vyos_config:
    lines:
      - set nat source rule 21 outbound-interface name "{{ wan_interface }}"
      - set nat source rule 21 source address 10.3.1.0/24
      - set nat source rule 21 destination group network-group '!LAN-Addresses'
      - set nat source rule 21 translation address masquerade

- name: Source NAT — VLAN36 VPN egress
  vyos.vyos.vyos_config:
    lines:
      - set nat source rule 22 outbound-interface name "{{ wan_interface }}"
      - set nat source rule 22 source address 10.0.36.0/24
      - set nat source rule 22 destination group network-group '!LAN-Addresses'
      - set nat source rule 22 translation address masquerade

- name: Source NAT — single host 10.0.80.4 (UniFi controller)
  vyos.vyos.vyos_config:
    lines:
      - set nat source rule 23 outbound-interface name "{{ wan_interface }}"
      - set nat source rule 23 source address 10.0.80.4
      - set nat source rule 23 translation address masquerade

- name: Source NAT — VLAN36 over wg101
  vyos.vyos.vyos_config:
    lines:
      - set nat source rule 9999 outbound-interface name wg101
      - set nat source rule 9999 source address 10.0.36.0/24
      - set nat source rule 9999 translation address masquerade

# ===== Destination NAT (port forwards) ====================================
- name: DNAT 20 — Plex (32400) → 10.3.1.20
  vyos.vyos.vyos_config:
    lines:
      - set nat destination rule 20 inbound-interface name "{{ wan_interface }}"
      - set nat destination rule 20 protocol tcp_udp
      - set nat destination rule 20 destination port 32400
      - set nat destination rule 20 translation address 10.3.1.20
