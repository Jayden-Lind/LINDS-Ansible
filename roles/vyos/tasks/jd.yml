---
# JD VyOS (10.0.50.1, jd-vyos-01) — orchestrator only.
# All actual configuration lives in the jd_*.yml include files below,
# grouped by concern so each file is short and self-explanatory.

- name: System (hostname, login, etc.)
  ansible.builtin.include_tasks:
    file: jd_system.yml

- name: Physical interfaces (eth1, eth2)
  ansible.builtin.include_tasks:
    file: jd_interfaces.yml

- name: VLAN sub-interfaces + their DHCP
  ansible.builtin.include_tasks:
    file: jd_vlan.yml

- name: DHCP server (JD-LAN)
  ansible.builtin.include_tasks:
    file: jd_dhcp.yml

- name: DNS forwarder
  ansible.builtin.include_tasks:
    file: jd_dns.yml

- name: Services (SSH, SNMP, LLDP, router-advert)
  ansible.builtin.include_tasks:
    file: jd_services.yml

- name: NAT (source + destination)
  ansible.builtin.include_tasks:
    file: jd_nat.yml

- name: WireGuard tunnels + policy routing
  ansible.builtin.include_tasks:
    file: jd_wireguard.yml

- name: Firewall
  ansible.builtin.include_tasks:
    file: jd_firewall.yml

- name: BGP + route-maps + static routes
  ansible.builtin.include_tasks:
    file: jd_bgp.yml

- name: IPsec site-to-site (LINDS peer)
  ansible.builtin.include_tasks:
    file: jd_site_to_site.yml

- name: IPsec remote-access (mobile clients)
  ansible.builtin.include_tasks:
    file: jd_remote_access.yml
