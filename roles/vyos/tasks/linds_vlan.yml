---
# VLAN sub-interfaces on the LAN trunk + their DHCP scopes.
# NAT for these networks lives in linds_nat.yml.
#
#   VLAN 36  (10.0.36.0/24)  — VPN (egress over wg101)
#   VLAN 80  (10.0.80.0/24)  — Management (UniFi controller etc.)
#   VLAN 110 (10.0.110.0/24) — Cameras
#   VLAN 300 (10.3.1.0/24)   — Server / k8s

# ----- VLAN 36: VPN --------------------------------------------------------
- name: VLAN 36 VPN — interface
  vyos.vyos.vyos_config:
    lines:
      - set interfaces ethernet "{{ main_lan_interface }}" vif 36 address 10.0.36.1/24
      - set interfaces ethernet "{{ main_lan_interface }}" vif 36 description vlan-36-management

- name: VLAN 36 VPN — DHCP
  vyos.vyos.vyos_config:
    lines:
      - set service dhcp-server shared-network-name LINDS_VPN option domain-name linds.com.au
      - set service dhcp-server shared-network-name LINDS_VPN option domain-search linds.com.au
      - set service dhcp-server shared-network-name LINDS_VPN option name-server 10.0.36.1
      - set service dhcp-server shared-network-name LINDS_VPN subnet 10.0.36.0/24 subnet-id 5
      - set service dhcp-server shared-network-name LINDS_VPN subnet 10.0.36.0/24 option default-router 10.0.36.1
      - set service dhcp-server shared-network-name LINDS_VPN subnet 10.0.36.0/24 range 0 start 10.0.36.2
      - set service dhcp-server shared-network-name LINDS_VPN subnet 10.0.36.0/24 range 0 stop 10.0.36.199

# ----- VLAN 80: Management -------------------------------------------------
- name: VLAN 80 Management — interface
  vyos.vyos.vyos_config:
    lines:
      - set interfaces ethernet "{{ main_lan_interface }}" vif 80 address 10.0.80.1/24
      - set interfaces ethernet "{{ main_lan_interface }}" vif 80 description vlan-80-management

- name: VLAN 80 Management — DHCP
  vyos.vyos.vyos_config:
    lines:
      - set service dhcp-server shared-network-name LINDS_MANAGEMENT option domain-name linds.com.au
      - set service dhcp-server shared-network-name LINDS_MANAGEMENT option domain-search linds.com.au
      - set service dhcp-server shared-network-name LINDS_MANAGEMENT option name-server 10.0.80.1
      - set service dhcp-server shared-network-name LINDS_MANAGEMENT subnet 10.0.80.0/24 subnet-id 4
      - set service dhcp-server shared-network-name LINDS_MANAGEMENT subnet 10.0.80.0/24 option default-router 10.0.80.1
      - set service dhcp-server shared-network-name LINDS_MANAGEMENT subnet 10.0.80.0/24 range 0 start 10.0.80.2
      - set service dhcp-server shared-network-name LINDS_MANAGEMENT subnet 10.0.80.0/24 range 0 stop 10.0.80.199
      - set service dhcp-server shared-network-name LINDS_MANAGEMENT subnet 10.0.80.0/24 exclude 10.0.80.4

# ----- VLAN 110: Cameras ---------------------------------------------------
- name: VLAN 110 Cameras — interface
  vyos.vyos.vyos_config:
    lines:
      - set interfaces ethernet "{{ main_lan_interface }}" vif 110 address 10.0.110.1/24
      - set interfaces ethernet "{{ main_lan_interface }}" vif 110 description vlan-110-cameras

- name: VLAN 110 Cameras — DHCP
  vyos.vyos.vyos_config:
    lines:
      - set service dhcp-server shared-network-name LINDS_CAMERAS option domain-name linds.com.au
      - set service dhcp-server shared-network-name LINDS_CAMERAS option domain-search linds.com.au
      - set service dhcp-server shared-network-name LINDS_CAMERAS option name-server 10.0.110.1
      - set service dhcp-server shared-network-name LINDS_CAMERAS subnet 10.0.110.0/24 subnet-id 3
      - set service dhcp-server shared-network-name LINDS_CAMERAS subnet 10.0.110.0/24 option default-router 10.0.110.1
      - set service dhcp-server shared-network-name LINDS_CAMERAS subnet 10.0.110.0/24 range 0 start 10.0.110.2
      - set service dhcp-server shared-network-name LINDS_CAMERAS subnet 10.0.110.0/24 range 0 stop 10.0.110.199

# ----- VLAN 300: Server ----------------------------------------------------
- name: VLAN 300 Server — interface
  vyos.vyos.vyos_config:
    lines:
      - set interfaces ethernet "{{ main_lan_interface }}" vif 300 address 10.3.1.1/24

- name: VLAN 300 Server — DHCP shared-network options
  vyos.vyos.vyos_config:
    lines:
      - set service dhcp-server shared-network-name LINDS-SERVER option domain-name linds.com.au
      - set service dhcp-server shared-network-name LINDS-SERVER option domain-search linds.com.au
      - set service dhcp-server shared-network-name LINDS-SERVER option name-server 10.3.1.1
      - set service dhcp-server shared-network-name LINDS-SERVER option name-server 10.3.1.200

- name: VLAN 300 Server — DHCP subnet 10.3.1.0/24
  vyos.vyos.vyos_config:
    lines:
      - set service dhcp-server shared-network-name LINDS-SERVER subnet 10.3.1.0/24 subnet-id 2
      - set service dhcp-server shared-network-name LINDS-SERVER subnet 10.3.1.0/24 option default-router 10.3.1.1
      - set service dhcp-server shared-network-name LINDS-SERVER subnet 10.3.1.0/24 range 0 start 10.3.1.2
      - set service dhcp-server shared-network-name LINDS-SERVER subnet 10.3.1.0/24 range 0 stop 10.3.1.199

- name: VLAN 300 Server — static mappings (talos workers)
  vyos.vyos.vyos_config:
    lines:
      - set service dhcp-server shared-network-name LINDS-SERVER subnet 10.3.1.0/24 static-mapping {{ item.name }} ip-address {{ item.ip }}
      - set service dhcp-server shared-network-name LINDS-SERVER subnet 10.3.1.0/24 static-mapping {{ item.name }} mac '{{ item.mac }}'
  loop:
    - { name: talos-linds-worker-01, ip: 10.3.1.100, mac: '02:24:11:d4:f3:e1' }
    - { name: talos-linds-worker-02, ip: 10.3.1.101, mac: '02:24:11:d4:f3:e2' }
