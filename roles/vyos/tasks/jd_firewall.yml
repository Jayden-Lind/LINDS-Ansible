---
# Filter chains. Global-options live in main.yml.

- name: Firewall global options
  vyos.vyos.vyos_config:
    lines:
      - set firewall global-options all-ping enable
      - set firewall global-options broadcast-ping enable
      - set firewall global-options log-martians enable
      - set firewall global-options source-validation loose
      - set firewall global-options syn-cookies enable
      - set firewall global-options twa-hazards-protection enable

- name: Default-action on all chains (v4 input drop, rest accept)
  vyos.vyos.vyos_config:
    lines:
      - set firewall ipv4 forward filter default-action accept
      - set firewall ipv4 input filter default-action drop
      - set firewall ipv4 output filter default-action accept
      - set firewall ipv6 forward filter default-action accept
      - set firewall ipv6 input filter default-action accept
      - set firewall ipv6 output filter default-action accept

- name: Input filter — remove dead INPUT rules for DNAT'd services (Plex, Minecraft)
  vyos.vyos.vyos_config:
    lines:
      - delete firewall ipv4 input filter rule 5
      - delete firewall ipv4 input filter rule 6
  ignore_errors: true

- name: Input filter — established/related (return traffic)
  vyos.vyos.vyos_config:
    lines:
      - set firewall ipv4 input filter rule 1 action accept
      - set firewall ipv4 input filter rule 1 state established
      - set firewall ipv4 input filter rule 1 state related

- name: Forward filter — game server passthrough (27015)
  vyos.vyos.vyos_config:
    lines:
      - set firewall ipv4 forward filter rule 50 action accept
      - set firewall ipv4 forward filter rule 50 inbound-interface name "{{ wan_interface }}"
      - set firewall ipv4 forward filter rule 50 protocol tcp_udp
      - set firewall ipv4 forward filter rule 50 destination port 27015

- name: Input filter — IPSEC mobile (500/4500)
  vyos.vyos.vyos_config:
    lines:
      - set firewall ipv4 input filter rule 3 action accept
      - set firewall ipv4 input filter rule 3 inbound-interface name "{{ wan_interface }}"
      - set firewall ipv4 input filter rule 3 protocol tcp_udp
      - set firewall ipv4 input filter rule 3 destination port 500,4500

- name: Input filter — SSH (LAN only)
  vyos.vyos.vyos_config:
    lines:
      - set firewall ipv4 input filter rule 4 action accept
      - set firewall ipv4 input filter rule 4 protocol tcp
      - set firewall ipv4 input filter rule 4 destination port 22
      - set firewall ipv4 input filter rule 4 source group network-group LAN-Addresses

- name: Input filter — BGP (LAN only)
  vyos.vyos.vyos_config:
    lines:
      - set firewall ipv4 input filter rule 8 action accept
      - set firewall ipv4 input filter rule 8 protocol tcp
      - set firewall ipv4 input filter rule 8 destination port 179
      - set firewall ipv4 input filter rule 8 source group network-group LAN-Addresses

- name: Input filter — DNS (LAN only)
  vyos.vyos.vyos_config:
    lines:
      - set firewall ipv4 input filter rule 9 action accept
      - set firewall ipv4 input filter rule 9 protocol tcp_udp
      - set firewall ipv4 input filter rule 9 destination port 53
      - set firewall ipv4 input filter rule 9 source group network-group LAN-Addresses

- name: Input filter — SNMP (LAN only)
  vyos.vyos.vyos_config:
    lines:
      - set firewall ipv4 input filter rule 10 action accept
      - set firewall ipv4 input filter rule 10 protocol udp
      - set firewall ipv4 input filter rule 10 destination port 161
      - set firewall ipv4 input filter rule 10 source group network-group LAN-Addresses

- name: Input filter — NTP (LAN only)
  vyos.vyos.vyos_config:
    lines:
      - set firewall ipv4 input filter rule 11 action accept
      - set firewall ipv4 input filter rule 11 protocol udp
      - set firewall ipv4 input filter rule 11 destination port 123
      - set firewall ipv4 input filter rule 11 source group network-group LAN-Addresses

