---
# eth1 = WAN, eth0 = LAN trunk. WAN/LAN base config (offload, MTU,
# DHCP, MSS clamp) is set in main.yml; this file holds the LINDS-specific
# IPv6, prefix delegation, and LAN IPv4 address.

- name: LAN IPv4 address
  vyos.vyos.vyos_l3_interfaces:
    config:
      - name: "{{ main_lan_interface }}"
        ipv4:
          - address: 192.168.6.1/24

- name: LAN IPv6 (autoconf + DAD)
  vyos.vyos.vyos_config:
    lines:
      - set interfaces ethernet "{{ main_lan_interface }}" ipv6 address autoconf
      - set interfaces ethernet "{{ main_lan_interface }}" ipv6 adjust-mss clamp-mss-to-pmtu
      - set interfaces ethernet "{{ main_lan_interface }}" ipv6 dup-addr-detect-transmits 1

- name: WAN DHCPv6 prefix delegation to LAN (rapid-commit)
  vyos.vyos.vyos_config:
    lines:
      - set interfaces ethernet "{{ wan_interface }}" dhcpv6-options pd 0 length 56
      - set interfaces ethernet "{{ wan_interface }}" dhcpv6-options pd 0 interface "{{ main_lan_interface }}" address 0
      - set interfaces ethernet "{{ wan_interface }}" dhcpv6-options pd 0 interface "{{ main_lan_interface }}" sla-id 0
      - set interfaces ethernet "{{ wan_interface }}" dhcpv6-options rapid-commit
