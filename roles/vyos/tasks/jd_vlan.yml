---
# VLAN sub-interfaces on the LAN trunk + their DHCP scopes.
# NAT for these networks lives in jd_nat.yml.
#
#   VLAN 51 (10.0.51.0/24) — torrent egress over wg101
#   VLAN 52 (10.0.52.0/24) - Isolated VLAN
#   VLAN 53 (10.0.53.0/24) — k8s/dev
#   VLAN 58 (10.0.58.0/24) — US egress over wg10

# ----- VLAN 51: torrent ----------------------------------------------------
- name: VLAN 51 torrent — interface
  vyos.vyos.vyos_config:
    lines:
      - set interfaces ethernet "{{ main_lan_interface }}" vif 51 address 10.0.51.1/24
      - set interfaces ethernet "{{ main_lan_interface }}" vif 51 description vlan-51-torrent

- name: VLAN 51 torrent — DHCP
  vyos.vyos.vyos_config:
    lines:
      - set service dhcp-server shared-network-name torrent-lan option name-server 1.1.1.1
      - set service dhcp-server shared-network-name torrent-lan subnet 10.0.51.0/24 subnet-id 3
      - set service dhcp-server shared-network-name torrent-lan subnet 10.0.51.0/24 option default-router 10.0.51.1
      - set service dhcp-server shared-network-name torrent-lan subnet 10.0.51.0/24 option name-server 1.1.1.1
      - set service dhcp-server shared-network-name torrent-lan subnet 10.0.51.0/24 range 0 start 10.0.51.2
      - set service dhcp-server shared-network-name torrent-lan subnet 10.0.51.0/24 range 0 stop 10.0.51.199

# ----- VLAN 52: isolated ---------------------------------------------------
- name: VLAN 52 isolation — interface
  vyos.vyos.vyos_config:
    lines:
      - set interfaces ethernet "{{ main_lan_interface }}" vif 52 address 10.0.52.1/24
      - set interfaces ethernet "{{ main_lan_interface }}" vif 52 description vlan-52-isolated

- name: VLAN 52 isolation — DHCP
  vyos.vyos.vyos_config:
    lines:
      - set service dhcp-server shared-network-name VLAN_ISOLATION option name-server 1.1.1.1
      - set service dhcp-server shared-network-name VLAN_ISOLATION subnet 10.0.52.0/24 subnet-id 5
      - set service dhcp-server shared-network-name VLAN_ISOLATION subnet 10.0.52.0/24 option default-router 10.0.52.1
      - set service dhcp-server shared-network-name VLAN_ISOLATION subnet 10.0.52.0/24 option name-server 1.1.1.1
      - set service dhcp-server shared-network-name VLAN_ISOLATION subnet 10.0.52.0/24 range 0 start 10.0.52.2
      - set service dhcp-server shared-network-name VLAN_ISOLATION subnet 10.0.52.0/24 range 0 stop 10.0.52.199

- name: Input filter — VLAN52 isolated (allow DHCP to router only)
  vyos.vyos.vyos_config:
    lines:
      - set firewall ipv4 input filter rule 1 action accept
      - set firewall ipv4 input filter rule 1 inbound-interface name "{{ main_lan_interface }}.52"
      - set firewall ipv4 input filter rule 1 protocol udp
      - set firewall ipv4 input filter rule 1 destination port 67
      - delete firewall ipv4 input filter rule 1 state
  ignore_errors: true

- name: Input filter — VLAN52 isolated (drop all other router-bound traffic)
  vyos.vyos.vyos_config:
    lines:
      - set firewall ipv4 input filter rule 2 action drop
      - set firewall ipv4 input filter rule 2 inbound-interface name "{{ main_lan_interface }}.52"

- name: Forward filter — VLAN52 isolated (allow return traffic for inbound connections)
  vyos.vyos.vyos_config:
    lines:
      - set firewall ipv4 forward filter rule 99 action accept
      - set firewall ipv4 forward filter rule 99 source address 10.0.52.0/24
      - set firewall ipv4 forward filter rule 99 destination group network-group LAN-Addresses
      - set firewall ipv4 forward filter rule 99 state established
      - set firewall ipv4 forward filter rule 99 state related

- name: Forward filter — VLAN52 isolated (block new inter-VLAN connections, allow internet)
  vyos.vyos.vyos_config:
    lines:
      - set firewall ipv4 forward filter rule 100 action drop
      - set firewall ipv4 forward filter rule 100 source address 10.0.52.0/24
      - set firewall ipv4 forward filter rule 100 destination group network-group LAN-Addresses


# ----- VLAN 53: dev / k8s --------------------------------------------------
- name: VLAN 53 dev — interface
  vyos.vyos.vyos_config:
    lines:
      - set interfaces ethernet "{{ main_lan_interface }}" vif 53 address 10.0.53.1/24
      - set interfaces ethernet "{{ main_lan_interface }}" vif 53 description vlan-53-dev

- name: VLAN 53 dev — DHCP shared-network options
  vyos.vyos.vyos_config:
    lines:
      - set service dhcp-server shared-network-name VLAN_DEV option domain-name linds.com.au
      - set service dhcp-server shared-network-name VLAN_DEV option domain-search linds.com.au
      - set service dhcp-server shared-network-name VLAN_DEV option name-server 10.0.53.1

- name: VLAN 53 dev — DHCP subnet 10.0.53.0/24
  vyos.vyos.vyos_config:
    lines:
      - set service dhcp-server shared-network-name VLAN_DEV subnet 10.0.53.0/24 subnet-id 2
      - set service dhcp-server shared-network-name VLAN_DEV subnet 10.0.53.0/24 option default-router 10.0.53.1
      - set service dhcp-server shared-network-name VLAN_DEV subnet 10.0.53.0/24 option domain-name linds.com.au
      - set service dhcp-server shared-network-name VLAN_DEV subnet 10.0.53.0/24 option domain-search linds.com.au
      - set service dhcp-server shared-network-name VLAN_DEV subnet 10.0.53.0/24 option name-server 10.0.53.1
      - set service dhcp-server shared-network-name VLAN_DEV subnet 10.0.53.0/24 range 0 start 10.0.53.2
      - set service dhcp-server shared-network-name VLAN_DEV subnet 10.0.53.0/24 range 0 stop 10.0.53.50
      - set service dhcp-server shared-network-name VLAN_DEV subnet 10.0.53.0/24 exclude 10.0.53.20
      - set service dhcp-server shared-network-name VLAN_DEV subnet 10.0.53.0/24 exclude 10.0.53.50

- name: VLAN 53 dev — static mappings (k8s nodes)
  vyos.vyos.vyos_config:
    lines:
      - set service dhcp-server shared-network-name VLAN_DEV subnet 10.0.53.0/24 static-mapping {{ item.name }} ip-address {{ item.ip }}
      - set service dhcp-server shared-network-name VLAN_DEV subnet 10.0.53.0/24 static-mapping {{ item.name }} mac '{{ item.mac }}'
  loop:
    - { name: jd-kube-01,      ip: 10.0.53.11,  mac: 'bc:24:11:32:93:c4' }
    - { name: talos-cp,        ip: 10.0.53.200, mac: 'BC:24:11:D4:F3:C1' }
    - { name: talos-worker-01, ip: 10.0.53.201, mac: '02:24:11:d4:f3:d1' }
    - { name: talos-worker-02, ip: 10.0.53.202, mac: '02:24:11:d4:f3:d2' }
    - { name: talos-worker-03, ip: 10.0.53.203, mac: '02:24:11:d4:f3:d3' }

# ----- VLAN 58: US ---------------------------------------------------------
- name: VLAN 58 US — interface
  vyos.vyos.vyos_config:
    lines:
      - set interfaces ethernet "{{ main_lan_interface }}" vif 58 address 10.0.58.1/24
      - set interfaces ethernet "{{ main_lan_interface }}" vif 58 description vlan-58-us

- name: VLAN 58 US — DHCP
  vyos.vyos.vyos_config:
    lines:
      - set service dhcp-server shared-network-name us-lan option name-server 103.86.96.100
      - set service dhcp-server shared-network-name us-lan subnet 10.0.58.0/24 subnet-id 4
      - set service dhcp-server shared-network-name us-lan subnet 10.0.58.0/24 option default-router 10.0.58.1
      - set service dhcp-server shared-network-name us-lan subnet 10.0.58.0/24 option name-server 103.86.96.100
      - set service dhcp-server shared-network-name us-lan subnet 10.0.58.0/24 range 0 start 10.0.58.2
      - set service dhcp-server shared-network-name us-lan subnet 10.0.58.0/24 range 0 stop 10.0.58.199
