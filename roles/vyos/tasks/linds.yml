---
# LINDS VyOS (192.168.6.1, linds-vyos-01) — orchestrator only.
# All configuration lives in the linds_*.yml include files below,
# parallel to the JD layout in jd.yml.

- name: System (hostname, login, etc.)
  ansible.builtin.include_tasks:
    file: linds_system.yml

- name: Physical interfaces (eth0, eth1)
  ansible.builtin.include_tasks:
    file: linds_interfaces.yml

- name: VLAN sub-interfaces + their DHCP
  ansible.builtin.include_tasks:
    file: linds_vlan.yml

- name: DHCP server (LINDS-LAN + dynamic DNS update)
  ansible.builtin.include_tasks:
    file: linds_dhcp.yml

- name: DNS forwarder
  ansible.builtin.include_tasks:
    file: linds_dns.yml

- name: Services (SSH, SNMP, LLDP, router-advert)
  ansible.builtin.include_tasks:
    file: linds_services.yml

- name: NAT (source + destination)
  ansible.builtin.include_tasks:
    file: linds_nat.yml

- name: WireGuard tunnel + policy routing
  ansible.builtin.include_tasks:
    file: linds_wireguard.yml

- name: Firewall
  ansible.builtin.include_tasks:
    file: linds_firewall.yml

- name: BGP + route-maps + static routes
  ansible.builtin.include_tasks:
    file: linds_bgp.yml

- name: IPsec site-to-site (JD peer)
  ansible.builtin.include_tasks:
    file: linds_site_to_site.yml
