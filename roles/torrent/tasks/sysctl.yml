---
- name: Ensure torrent sysctl file exists
  become: true
  ansible.builtin.file:
    path: "{{ torrent_sysctl_file }}"
    state: touch
    owner: root
    group: root
    mode: '0644'

- name: Apply sysctl tuning for torrenting VM (persist + apply)
  become: true
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    sysctl_file: "{{ torrent_sysctl_file }}"
    reload: true
  loop: "{{ torrent_sysctl_settings | dict2items }}"

