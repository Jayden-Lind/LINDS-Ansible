---
- name: Install packages (Debian)
  ansible.builtin.include_tasks: install-debian.yml
  when: ansible_facts.os_family == 'Debian'

- name: Install packages (RedHat)
  ansible.builtin.include_tasks: install-redhat.yml
  when: ansible_facts.os_family == 'RedHat'

- name: Create config directory
  ansible.builtin.file:
    path: "{{ torrent_config_dir | default('/root/.config/qBittorrent') }}"
    state: directory
    mode: "0755"

- name: Include JD
  ansible.builtin.include_tasks:
    file: jd.yml
  when: inventory_hostname in groups['jd_torrent']

- name: Include LINDS
  ansible.builtin.include_tasks:
    file: linds.yml
  when: inventory_hostname in groups['linds_torrent']

- name: Apply torrenting VM sysctl/kernel tuning
  ansible.builtin.include_tasks: sysctl.yml

- name: Manage qBittorrent service
  ansible.builtin.include_tasks: service.yml
