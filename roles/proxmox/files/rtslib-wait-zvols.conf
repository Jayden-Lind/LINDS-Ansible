# Ensure ZFS zvol device links exist before restoring the LIO config,
# otherwise block backstores + LUN mappings are silently skipped.
# See /usr/local/sbin/wait-lio-backstore-devs.sh
[Unit]
After=zfs.target zfs-volumes.target
Wants=zfs-volumes.target

[Service]
ExecStartPre=/usr/local/sbin/wait-lio-backstore-devs.sh
