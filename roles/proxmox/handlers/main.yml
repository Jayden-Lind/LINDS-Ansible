---
- name: Reload NFS exports
  ansible.builtin.command: exportfs -ra
  changed_when: true

- name: Reload iSCSI target
  ansible.builtin.command: targetctl restore
  changed_when: true

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart fan-control
  ansible.builtin.systemd:
    name: fan-control
    state: restarted
    daemon_reload: true
